<oj-sp-general-overview-page id="oj_dt_gop" display-options.responsive-padding="off" display-mode="mixed"
  page-title="[[ $variables.pageTitle ]]" page-subtitle="[[ $variables.pageSubtitle ]]"
  primary-action.label="Export" primary-action.display="on"
  contextual-info="[[ $variables.contextualInfo ]]" badge="[[ $variables.badge ]]"
  on-sp-go-to-parent="[[ $listeners.goToParentChain ]]" on-sp-primary-action="[[ $listeners.primaryActionChain ]]"
  class="oj-sm-width-full" style="--oj-sp-general-overview-page-max-width: 90% !important;">

  <div class="oj-flex oj-sm-flex-direction-column oj-sm-width-full oj-sm-gap-4x" slot="main" style="max-width:100% !important;">

    <oj-sp-smart-search filter-criterion="{{ $variables.filterCriterion }}"
      on-filter-criterion-changed="[[ $listeners.filterCriterionChanged ]]"
      search-context="[[ $variables.searchContext ]]" search-config="[[ $variables.searchConfiguration.provider ]]"
      suggestion-filters='["ProjectNumberFilter", "BusinessUnitFilter", "ProjectOrgFilter"]' placeholder="Search by PO number, item, supplier - or add filters">
    </oj-sp-smart-search>

    <oj-bind-if test="[[ $variables.planHeader.projectName ]]">
      <div class="dt-plan-header">
        <div class="dt-field"><span class="dt-field-label">Project Name</span>
          <span class="dt-field-value"><oj-bind-text value="[[ $variables.planHeader.projectName ]]"></oj-bind-text></span></div>
        <div class="dt-field"><span class="dt-field-label">Business Unit</span>
          <span class="dt-field-value"><oj-bind-text value="[[ $variables.planHeader.businessUnit || 'Select Business Unit' ]]"></oj-bind-text></span></div>
        <div class="dt-field"><span class="dt-field-label">Project Organization</span>
          <span class="dt-field-value"><oj-bind-text value="[[ $variables.planHeader.projectOrg || 'Select Organization' ]]"></oj-bind-text></span></div>
        <div class="dt-field"><span class="dt-field-label">Project Manager</span>
          <span class="dt-field-value"><oj-bind-text value="[[ $variables.planHeader.projectManager ]]"></oj-bind-text></span></div>
      </div>
    </oj-bind-if>

    <oj-table id="deliveryTable" data="[[ $variables.deliveryADP ]]" class="oj-sm-width-full"
      horizontal-grid-visible="enabled" vertical-grid-visible="disabled"
      scroll-policy="loadMoreOnScroll" scroll-policy-options.fetch-size="25"
      selection-mode='{"row":"none","column":"none"}'
      columns='[{"headerText":"PO Number","field":"poNumber","headerClassName":"list-header-label","width":120},{"headerText":"Item","field":"itemNumber","headerClassName":"list-header-label","width":120},{"headerText":"Item Description","template":"itemDescTemplate","headerClassName":"list-header-label","weight":3,"minWidth":190},{"headerText":"Supplier","field":"supplier","headerClassName":"list-header-label","width":120},{"headerText":"Buyer","field":"buyer","headerClassName":"list-header-label","width":130},{"headerText":"Line Status","field":"lineStatus","headerClassName":"list-header-label","width":120},{"headerText":"PO Creation","field":"poCreationDate","headerClassName":"list-header-label","width":120},{"headerText":"Need By","field":"needByDate","headerClassName":"list-header-label","width":120},{"headerText":"Promised","field":"promisedDate","headerClassName":"list-header-label","width":120},{"headerText":"Actual","field":"actualDate","headerClassName":"list-header-label","width":120},{"headerText":"Status","template":"statusTemplate","headerClassName":"list-header-label","width":120}]'>

      <template slot="itemDescTemplate" data-oj-as="cell"><span class="oj-typography-body-md oj-typography-semi-bold"><oj-bind-text value="[[ cell.row.itemDescription ]]"></oj-bind-text></span></template>
      <template slot="statusTemplate" data-oj-as="cell"><span :class="[[ $functions.statusClass(cell.row.status) ]]"><oj-bind-text value="[[ cell.row.status ]]"></oj-bind-text></span></template>

    </oj-table>

  </div>
</oj-sp-general-overview-page>
