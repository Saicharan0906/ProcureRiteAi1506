<!-- Cost Tracker — rebuilt fresh on Redwood (oj-sp-general-overview-page), same
     theme/banner/header. Read-only analytical grid: planned vs actual spend.
     Smart-search filters mirror the original page. Data is mock placeholder. -->

<oj-sp-general-overview-page
  id="oj_ct_gop"
  display-options.responsive-padding="off"
  display-mode="mixed"
  page-title="[[ $variables.pageTitle ]]"
  page-subtitle="[[ $variables.pageSubtitle ]]"
  primary-action.label="Export"
  primary-action.display="on"
  contextual-info="[[ $variables.contextualInfo ]]"
  badge="[[ $variables.badge ]]"
  on-sp-go-to-parent="[[ $listeners.goToParentChain ]]"
  on-sp-primary-action="[[ $listeners.primaryActionChain ]]"
  class="oj-sm-width-full"
  style="--oj-sp-general-overview-page-max-width: 100% !important;">

  <div class="oj-flex oj-sm-flex-direction-column oj-sm-width-full oj-sm-gap-4x"
       slot="main" style="max-width: 100% !important;">

    <oj-sp-smart-search
      filter-criterion="{{ $variables.filterCriterion }}"
      on-filter-criterion-changed="[[ $listeners.filterCriterionChanged ]]"
      search-context="[[ $variables.searchContext ]]"
      search-config="[[ $variables.searchConfiguration.provider ]]"
      suggestion-filters='["ProjectNumberFilter","BusinessUnitFilter","ProjectOrgFilter","PONumberFilter","SupplierFilter","ItemCategoryFilter"]'
      placeholder="Search by item, supplier, PO number — or add filters">
    </oj-sp-smart-search>

    <oj-bind-if test="[[ $variables.planHeader.projectName ]]">
      <div class="ct-plan-header">
        <div class="ct-field"><span class="ct-field-label">Project Name</span>
          <span class="ct-field-value"><oj-bind-text value="[[ $variables.planHeader.projectName ]]"></oj-bind-text></span></div>
        <div class="ct-field"><span class="ct-field-label">Business Unit</span>
          <span class="ct-field-value"><oj-bind-text value="[[ $variables.planHeader.businessUnit || 'Select Business Unit' ]]"></oj-bind-text></span></div>
        <div class="ct-field"><span class="ct-field-label">Project Organization</span>
          <span class="ct-field-value"><oj-bind-text value="[[ $variables.planHeader.projectOrg || 'Select Organization' ]]"></oj-bind-text></span></div>
        <div class="ct-field"><span class="ct-field-label">Planned Cost</span>
          <span class="ct-field-value"><oj-bind-text value="[[ $variables.planHeader.plannedCostTotal ]]"></oj-bind-text></span></div>
        <div class="ct-field"><span class="ct-field-label">Ordered Amount</span>
          <span class="ct-field-value"><oj-bind-text value="[[ $variables.planHeader.orderedTotal ]]"></oj-bind-text></span></div>
      </div>
    </oj-bind-if>

    <oj-table
      id="costLinesTable"
      data="[[ $variables.costLinesADP ]]"
      class="oj-sm-width-full"
      horizontal-grid-visible="enabled"
      vertical-grid-visible="disabled"
      scroll-policy="loadMoreOnScroll"
      scroll-policy-options.fetch-size="25"
      selection-mode='{"row": "none", "column": "none"}'
      columns='[
        {"headerText": "Task #",        "field": "taskNumber",     "headerClassName": "list-header-label", "width": 90},
        {"headerText": "Task Name",     "field": "taskName",       "headerClassName": "list-header-label", "width": 140},
        {"headerText": "Item Number",   "field": "itemNumber",     "headerClassName": "list-header-label", "width": 130},
        {"headerText": "Item Description","template": "itemDescTemplate","headerClassName": "list-header-label", "weight": 3, "minWidth": 200},
        {"headerText": "Item Category", "field": "itemCategory",   "headerClassName": "list-header-label", "width": 150},
        {"headerText": "Supplier",      "field": "supplier",       "headerClassName": "list-header-label", "width": 130},
        {"headerText": "Buyer",         "field": "buyer",          "headerClassName": "list-header-label", "width": 140},
        {"headerText": "PO Number",     "field": "poNumber",       "headerClassName": "list-header-label", "width": 130},
        {"headerText": "Status",        "template": "statusTemplate","headerClassName": "list-header-label", "width": 170},
        {"headerText": "Planned Cost",  "template": "plannedTemplate","headerClassName": "list-header-label", "width": 130},
        {"headerText": "Ordered Amount","template": "orderedTemplate","headerClassName": "list-header-label", "width": 140},
        {"headerText": "Unit Price",    "template": "unitTemplate", "headerClassName": "list-header-label", "width": 120}
      ]'>

      <template slot="itemDescTemplate" data-oj-as="cell">
        <span class="oj-typography-body-md oj-typography-semi-bold">
          <oj-bind-text value="[[ cell.row.itemDescription ]]"></oj-bind-text>
        </span>
      </template>

      <template slot="plannedTemplate" data-oj-as="cell">
        <span class="oj-typography-body-sm"><oj-bind-text value="[[ $functions.formatCurrency(cell.row.plannedCost, cell.row.currency) ]]"></oj-bind-text></span>
      </template>

      <template slot="orderedTemplate" data-oj-as="cell">
        <span class="oj-typography-body-sm"><oj-bind-text value="[[ $functions.formatCurrency(cell.row.orderedAmount, cell.row.currency) ]]"></oj-bind-text></span>
      </template>

      <template slot="unitTemplate" data-oj-as="cell">
        <span class="oj-typography-body-sm"><oj-bind-text value="[[ $functions.formatCurrency(cell.row.unitPrice, cell.row.currency) ]]"></oj-bind-text></span>
      </template>

      <template slot="statusTemplate" data-oj-as="cell">
        <span :class="[[
          cell.row.status === 'CLOSED FOR RECEIVING' ? 'ct-status-closed' :
          cell.row.status === 'INCOMPLETE'           ? 'ct-status-incomplete' :
                                                       'ct-status-open'
        ]]">
          <oj-bind-text value="[[ cell.row.status ]]"></oj-bind-text>
        </span>
      </template>

    </oj-table>

  </div>

</oj-sp-general-overview-page>
