<!-- Procurement Execution — Redwood oj-sp-general-overview-page, structured like the
     Project Procurement Plan page. Smart search in the banner; execution lines from ORDS
     getPDSCExecuteDetails; project->BU/Org cascade from direct Fusion REST (ORDS fallback).
     Bulk Actions (Purchase Requisition / Purchase Order / Negotiation / Initiate Supply Plan /
     Refresh ERP Details) act on the selected rows. -->

<oj-sp-general-overview-page
  id="oj_pexec_gop"
  display-mode="mixed"
  display-options.responsive-padding="on"
  page-title="[[ $variables.pageTitle ]]"
  primary-action.label="Refresh ERP Details"
  primary-action.display="on"
  secondary-actions="[[ $variables.secondaryActions ]]"
  on-sp-primary-action="[[ $listeners.primaryActionChain ]]"
  on-sp-secondary-action="[[ $listeners.secondaryActionChain ]]"
  on-sp-go-to-parent="[[ $listeners.goToParentChain ]]">

  <oj-sp-smart-search
    slot="search"
    filter-criterion="{{ $variables.filterCriterion }}"
    on-filter-criterion-changed="[[ $listeners.filterCriterionChanged ]]"
    search-context="[[ $variables.searchContext ]]"
    search-config="[[ $variables.searchConfiguration.provider ]]"
    ask-hint="Search by requisition / PO / negotiation number, item...">
  </oj-sp-smart-search>

  <div slot="main" class="page-content-max-width" style="min-width:0;max-width:100%;overflow-x:hidden;box-sizing:border-box;">
  <div style="margin:8px 16px 0 16px;border-radius:12px 12px 0 0;box-shadow:0 1px 14px rgba(0,0,0,0.12);background:#ffffff;overflow:hidden;min-width:0;box-sizing:border-box;">

    <oj-table
      id="execLinesTable"
      data="[[ $variables.execLinesADP ]]"
      style="width:calc(100vw - 64px);height:calc(100vh - 300px);min-height:460px;"
      horizontal-grid-visible="enabled"
      vertical-grid-visible="disabled"
      scroll-policy="loadMoreOnScroll"
      scroll-policy-options.fetch-size="25"
      selection-mode='{"row": "multiple", "column": "none"}'
      selected.row="{{ $variables.selectedKeys }}"
      columns='[
        {"headerText": "Plan Line #",    "field": "plan_line_number",   "headerClassName": "list-header-label", "width": 150},
        {"headerText": "Line Type",      "field": "line_type",          "headerClassName": "list-header-label", "width": 140},
        {"headerText": "Item",           "field": "item_number",        "headerClassName": "list-header-label", "width": 160},
        {"headerText": "Item Description","template": "itemDescTemplate","headerClassName": "list-header-label", "width": 240},
        {"headerText": "Category",       "field": "item_category",      "headerClassName": "list-header-label", "width": 190},
        {"headerText": "UOM",            "field": "uom",                "headerClassName": "list-header-label", "width": 90},
        {"headerText": "Planned Qty",    "field": "planned_quantity",   "headerClassName": "list-header-label", "width": 150},
        {"headerText": "Order Qty",      "field": "order_quantity",     "headerClassName": "list-header-label", "width": 150},
        {"headerText": "Requisition",    "field": "purchase_requisition","headerClassName": "list-header-label", "width": 160},
        {"headerText": "Purchase Order", "field": "purchase_order",     "headerClassName": "list-header-label", "width": 180},
        {"headerText": "Negotiation",    "field": "negotiation",        "headerClassName": "list-header-label", "width": 160},
        {"headerText": "Status",         "template": "statusTemplate",  "headerClassName": "list-header-label", "width": 180}
      ]'>

      <template slot="itemDescTemplate" data-oj-as="cell">
        <span class="oj-typography-body-md oj-typography-semi-bold">
          <oj-bind-text value="[[ cell.row.item_desc ]]"></oj-bind-text>
        </span>
      </template>

      <template slot="statusTemplate" data-oj-as="cell">
        <span :class="[[
          cell.row.status === 'PO Created'    ? 'pexec-status pexec-status-po'   :
          cell.row.status === 'Requisitioned' ? 'pexec-status pexec-status-req'  :
          cell.row.status === 'Negotiation'   ? 'pexec-status pexec-status-nego' :
          cell.row.status === 'Received'      ? 'pexec-status pexec-status-po'   :
                                                 'pexec-status pexec-status-ready'
        ]]">
          <oj-bind-text value="[[ cell.row.status ]]"></oj-bind-text>
        </span>
      </template>

      <template slot="noData">
        <div style="padding:40px 16px;text-align:center;color:#5a6b7b;">
          <span class="oj-ux-ico-search" style="font-size:30px;display:block;margin-bottom:10px;opacity:0.7;"></span>
          <div class="oj-typography-body-md">
            <oj-bind-text value="[[ $variables.planHeader.projectNumber ? 'No execution lines for this project (or your Business Unit access).' : 'Select a Project Number to load its execution lines.' ]]"></oj-bind-text>
          </div>
        </div>
      </template>

    </oj-table>

  </div>
  </div>

  <!-- ═══ Create Purchase Requisition — Redwood side drawer. Opened from the Actions menu
       ("Purchase Requisition") on the selected ready lines. Preparer / Requester / Destination
       Org apply to the whole requisition (one PR = one preparer); the staged lines are shown
       read-only with their Order Qty (defaulted to each line's remaining quantity) and Price.
       Create -> Fusion createRequisition (purchaseRequisitions POST), then ORDS sync
       (postPDSCGetReqDetailsForExec) + optimistic grid update. ═══ -->
  <oj-drawer-popup edge="end" opened="{{ $variables.prDrawerOpen }}" style="width: min(860px, 100vw);">
    <div class="oj-flex oj-sm-flex-direction-column" style="height:100%;overflow:hidden;">

      <div class="oj-flex oj-sm-align-items-center oj-sm-justify-content-space-between"
        style="padding:16px 20px;border-bottom:1px solid #e5e7eb;flex-shrink:0;">
        <div class="oj-typography-heading-sm">Create Purchase Requisition</div>
        <oj-button display="icons" chroming="borderless" on-oj-action="[[ $listeners.closePrDrawer ]]" title="Close">
          <span slot="startIcon" class="oj-ux-ico-close"></span>Close
        </oj-button>
      </div>

      <div style="flex:1;overflow-y:auto;padding:16px 24px;">
        <div class="oj-typography-body-sm" style="color:#5a6b7b;margin-bottom:12px;">
          <oj-bind-text value="[[ 'Requisitioning BU: ' + ($variables.planHeader.businessUnit || '-') + '   •   ' + $variables.prLinesArray.length + ' line(s)' ]]"></oj-bind-text>
        </div>

        <oj-form-layout label-edge="inside" max-columns="2" column-gap="20px">
          <oj-select-single label-hint="Preparer" data="[[ $variables.personADP ]]"
            item-text="person_name" value="{{ $variables.prForm.preparerId }}"
            on-value-item-changed="[[ $listeners.prPreparerChanged ]]"></oj-select-single>
          <oj-select-single label-hint="Requester" data="[[ $variables.personADP ]]"
            item-text="person_name" value="{{ $variables.prForm.requesterId }}"
            on-value-item-changed="[[ $listeners.prRequesterChanged ]]"></oj-select-single>
          <oj-select-single label-hint="Destination Organization" data="[[ $variables.destOrgADP ]]"
            item-text="organization_name" value="{{ $variables.prForm.destinationId }}"
            on-value-item-changed="[[ $listeners.prDestOrgChanged ]]"></oj-select-single>
        </oj-form-layout>

        <div class="oj-typography-subheading-xs" style="margin:18px 0 6px;">Lines</div>
        <oj-table
          id="prLinesTable"
          data="[[ $variables.prLinesADP ]]"
          style="width:100%;"
          horizontal-grid-visible="enabled"
          vertical-grid-visible="disabled"
          columns='[
            {"headerText": "Item",        "field": "item_number",  "headerClassName": "list-header-label", "width": 130},
            {"headerText": "Description", "field": "item_desc",     "headerClassName": "list-header-label", "width": 240},
            {"headerText": "Order Qty",   "field": "order_quantity","headerClassName": "list-header-label", "width": 110},
            {"headerText": "UOM",         "field": "uom",           "headerClassName": "list-header-label", "width": 80},
            {"headerText": "Price",       "field": "po_price_entered","headerClassName": "list-header-label", "width": 110}
          ]'>
          <template slot="noData">
            <div style="padding:20px;text-align:center;color:#5a6b7b;">No lines selected.</div>
          </template>
        </oj-table>
      </div>

      <div class="oj-flex oj-sm-align-items-center oj-sm-justify-content-flex-end"
        style="padding:12px 20px;border-top:1px solid #e5e7eb;gap:8px;flex-shrink:0;">
        <oj-button on-oj-action="[[ $listeners.closePrDrawer ]]">Cancel</oj-button>
        <oj-button chroming="callToAction" on-oj-action="[[ $listeners.createRequisition ]]"
          disabled="[[ $variables.prSaving ]]">Create Requisition</oj-button>
      </div>

    </div>
  </oj-drawer-popup>

  <!-- ═══ Create Purchase Order — Redwood side drawer. Opened from the Actions menu
       ("Purchase Order") on the selected lines. Header (Currency / Buyer / Bill-To /
       Supplier / Supplier Site / Supplier Email) applies to the whole PO; Supplier drives a
       cascade that loads its Sites + Emails. Lines are shown read-only (Order Qty defaulted to
       remaining). Create -> Fusion createPurchaseOrder (draftPurchaseOrders POST), then ORDS
       sync (postPDSCGetPODetailsForExec) + optimistic grid update. ═══ -->
  <oj-drawer-popup edge="end" opened="{{ $variables.poDrawerOpen }}" style="width: min(900px, 100vw);">
    <div class="oj-flex oj-sm-flex-direction-column" style="height:100%;overflow:hidden;">

      <div class="oj-flex oj-sm-align-items-center oj-sm-justify-content-space-between"
        style="padding:16px 20px;border-bottom:1px solid #e5e7eb;flex-shrink:0;">
        <div class="oj-typography-heading-sm">Create Purchase Order</div>
        <oj-button display="icons" chroming="borderless" on-oj-action="[[ $listeners.closePoDrawer ]]" title="Close">
          <span slot="startIcon" class="oj-ux-ico-close"></span>Close
        </oj-button>
      </div>

      <div style="flex:1;overflow-y:auto;padding:16px 24px;">
        <div class="oj-typography-body-sm" style="color:#5a6b7b;margin-bottom:12px;">
          <oj-bind-text value="[[ 'Procurement BU: ' + ($variables.planHeader.businessUnit || '-') + '   •   ' + $variables.poLinesArray.length + ' line(s)' ]]"></oj-bind-text>
        </div>

        <oj-form-layout label-edge="inside" max-columns="2" column-gap="20px">
          <oj-select-single label-hint="Currency" data="[[ $variables.poCurrencyADP ]]"
            item-text="CurrencyCode" value="{{ $variables.poForm.currencyCode }}"></oj-select-single>
          <oj-select-single label-hint="Buyer" data="[[ $variables.poBuyerADP ]]"
            item-text="Agent" value="{{ $variables.poForm.buyer }}"></oj-select-single>
          <oj-select-single label-hint="Bill To Location" data="[[ $variables.poBillToADP ]]"
            item-text="OrganizationName" value="{{ $variables.poForm.billToLocation }}"></oj-select-single>
          <oj-select-single label-hint="Supplier" data="[[ $variables.poSupplierADP ]]"
            item-text="vendor_name" value="{{ $variables.poForm.supplier }}"
            on-value-item-changed="[[ $listeners.poSupplierChanged ]]"></oj-select-single>
          <oj-select-single label-hint="Supplier Site" data="[[ $variables.poSiteADP ]]"
            item-text="vendor_site_code" value="{{ $variables.poForm.supplierSite }}"></oj-select-single>
          <oj-select-single label-hint="Supplier Email" data="[[ $variables.poEmailADP ]]"
            item-text="supplier_email_address" value="{{ $variables.poForm.supplierEmailAddress }}"></oj-select-single>
        </oj-form-layout>

        <div class="oj-typography-subheading-xs" style="margin:18px 0 6px;">Lines</div>
        <oj-table
          id="poLinesTable"
          data="[[ $variables.poLinesADP ]]"
          style="width:100%;"
          horizontal-grid-visible="enabled"
          vertical-grid-visible="disabled"
          columns='[
            {"headerText": "Item",        "field": "item_number",  "headerClassName": "list-header-label", "width": 130},
            {"headerText": "Description", "field": "item_desc",     "headerClassName": "list-header-label", "width": 240},
            {"headerText": "Order Qty",   "field": "order_quantity","headerClassName": "list-header-label", "width": 110},
            {"headerText": "UOM",         "field": "uom",           "headerClassName": "list-header-label", "width": 80},
            {"headerText": "Price",       "field": "po_price_entered","headerClassName": "list-header-label", "width": 110}
          ]'>
          <template slot="noData">
            <div style="padding:20px;text-align:center;color:#5a6b7b;">No lines selected.</div>
          </template>
        </oj-table>
      </div>

      <div class="oj-flex oj-sm-align-items-center oj-sm-justify-content-flex-end"
        style="padding:12px 20px;border-top:1px solid #e5e7eb;gap:8px;flex-shrink:0;">
        <oj-button on-oj-action="[[ $listeners.closePoDrawer ]]">Cancel</oj-button>
        <oj-button chroming="callToAction" on-oj-action="[[ $listeners.createPurchaseOrder ]]"
          disabled="[[ $variables.poSaving ]]">Create Purchase Order</oj-button>
      </div>

    </div>
  </oj-drawer-popup>

  <!-- ═══ Create Negotiation / RFQ — Redwood side drawer. Opened from the Actions menu
       ("Negotiation") on the selected lines. Type + Style drive a Template cascade. Create ->
       Fusion createNegotiation (CreateNegotiationFromTemplate) -> updateNegotiation (title/dates)
       -> addNegotiationLine per line -> ORDS postPDSCPopulateNegotiation, then optimistic grid
       update. ═══ -->
  <oj-drawer-popup edge="end" opened="{{ $variables.negDrawerOpen }}" style="width: min(900px, 100vw);">
    <div class="oj-flex oj-sm-flex-direction-column" style="height:100%;overflow:hidden;">

      <div class="oj-flex oj-sm-align-items-center oj-sm-justify-content-space-between"
        style="padding:16px 20px;border-bottom:1px solid #e5e7eb;flex-shrink:0;">
        <div class="oj-typography-heading-sm">Create Negotiation</div>
        <oj-button display="icons" chroming="borderless" on-oj-action="[[ $listeners.closeNegDrawer ]]" title="Close">
          <span slot="startIcon" class="oj-ux-ico-close"></span>Close
        </oj-button>
      </div>

      <div style="flex:1;overflow-y:auto;padding:16px 24px;">
        <div class="oj-typography-body-sm" style="color:#5a6b7b;margin-bottom:12px;">
          <oj-bind-text value="[[ 'Procurement BU: ' + ($variables.planHeader.businessUnit || '-') + '   •   ' + $variables.negLinesArray.length + ' line(s)' ]]"></oj-bind-text>
        </div>

        <oj-form-layout label-edge="inside" max-columns="2" column-gap="20px">
          <oj-select-single label-hint="Negotiation Type" data="[[ $variables.negTypeADP ]]"
            item-text="negotiation_display_name" value="{{ $variables.negForm.negotiationType }}"
            on-value-item-changed="[[ $listeners.negTypeStyleChanged ]]"></oj-select-single>
          <oj-select-single label-hint="Negotiation Style" data="[[ $variables.negStyleADP ]]"
            item-text="style_name" value="{{ $variables.negForm.negotiationStyle }}"
            on-value-item-changed="[[ $listeners.negTypeStyleChanged ]]"></oj-select-single>
          <oj-select-single label-hint="Template" data="[[ $variables.negTemplateADP ]]"
            item-text="auction_title" value="{{ $variables.negForm.negotiationTemplate }}"></oj-select-single>
          <oj-select-single label-hint="Currency" data="[[ $variables.negCurrencyADP ]]"
            item-text="CurrencyCode" value="{{ $variables.negForm.negotiationCurrency }}"></oj-select-single>
          <oj-select-single label-hint="Buyer" data="[[ $variables.negBuyerADP ]]"
            item-text="Agent" value="{{ $variables.negForm.buyer }}"></oj-select-single>
          <oj-input-text label-hint="Title" value="{{ $variables.negForm.title }}"></oj-input-text>
          <oj-input-date label-hint="Open Date" value="{{ $variables.negForm.opendate }}"></oj-input-date>
          <oj-input-date label-hint="Close Date" value="{{ $variables.negForm.closedate }}"></oj-input-date>
          <oj-input-text label-hint="Note to Suppliers" value="{{ $variables.negForm.notetoSupplier }}"></oj-input-text>
        </oj-form-layout>

        <div class="oj-typography-subheading-xs" style="margin:18px 0 6px;">Lines</div>
        <oj-table
          id="negLinesTable"
          data="[[ $variables.negLinesADP ]]"
          style="width:100%;"
          horizontal-grid-visible="enabled"
          vertical-grid-visible="disabled"
          columns='[
            {"headerText": "Item",        "field": "item_number",  "headerClassName": "list-header-label", "width": 130},
            {"headerText": "Description", "field": "item_desc",     "headerClassName": "list-header-label", "width": 260},
            {"headerText": "Est. Qty",    "field": "order_quantity","headerClassName": "list-header-label", "width": 110},
            {"headerText": "UOM",         "field": "uom",           "headerClassName": "list-header-label", "width": 80}
          ]'>
          <template slot="noData">
            <div style="padding:20px;text-align:center;color:#5a6b7b;">No lines selected.</div>
          </template>
        </oj-table>
      </div>

      <div class="oj-flex oj-sm-align-items-center oj-sm-justify-content-flex-end"
        style="padding:12px 20px;border-top:1px solid #e5e7eb;gap:8px;flex-shrink:0;">
        <oj-button on-oj-action="[[ $listeners.closeNegDrawer ]]">Cancel</oj-button>
        <oj-button chroming="callToAction" on-oj-action="[[ $listeners.createNegotiation ]]"
          disabled="[[ $variables.negSaving ]]">Create Negotiation</oj-button>
      </div>

    </div>
  </oj-drawer-popup>

</oj-sp-general-overview-page>
