<!-- Project Procurement Plan — Redwood oj-sp-general-overview-page with the smart search in
     the banner search slot and the grid in slot="main" (structure matches the onboardrite
     "Programs" reference page, which renders the search full-width with a filter dropdown
     rather than a chip bar). Data is mock placeholder pending ORDS wiring (getPDSCPlanDetails). -->

<oj-sp-general-overview-page
  id="oj_ppp_gop"
  display-mode="mixed"
  display-options.responsive-padding="on"
  page-title="[[ $variables.pageTitle ]]"
  primary-action.label="Add Line"
  primary-action.display="on"
  on-sp-primary-action="[[ $listeners.primaryActionChain ]]"
  on-sp-go-to-parent="[[ $listeners.goToParentChain ]]">

  <!-- ═══ Smart Search — banner search slot. On general-overview-page this renders
       full-width with the filter dropdown on click; applied filters become removable
       chips inside the input (matches the onboardrite "Programs" reference). ═══ -->
  <oj-sp-smart-search
    slot="search"
    filter-criterion="{{ $variables.filterCriterion }}"
    on-filter-criterion-changed="[[ $listeners.filterCriterionChanged ]]"
    search-context="[[ $variables.searchContext ]]"
    search-config="[[ $variables.searchConfiguration.provider ]]"
    ask-hint="Search by project number, item, supplier...">
  </oj-sp-smart-search>

  <!-- ═══ Main slot: result count + functional actions + grid.
       The oj-table is sized in VIEWPORT units (width = 100vw minus the 32px L/R inset
       on each side, + bounded height) so it can NEVER exceed the viewport —
       overflowing columns scroll INSIDE the table's own native scrollbar, not by
       scrolling the whole page (which would drag the banner sideways). width:100% was
       the trap: it resolves against a parent that grows to fit the wide grid, widening
       the page. overflow-x:hidden on this slot=main div (which is BELOW the banner, so
       it never touches the Add Line button) is a hard backstop guaranteeing the
       page/banner can't scroll horizontally. slot=main is styled (index.html) as a
       floating rounded inset card (16px side gap + 16px padding = 32px/side), so the
       table width 100vw-64px fills the card and lines up under the banner title. ═══ -->
  <div slot="main" class="page-content-max-width" style="min-width:0;max-width:100%;overflow-x:hidden;box-sizing:border-box;">
  <!-- Floating results CARD — plain div with INLINE styles (inline always renders;
       styling oj-sp-collection-container did nothing as it ignores the box). The 16px
       L/R margin is the side GAP that shows the teal banner beside the card; rounded
       top corners + soft shadow give the elevated onboardrite look. -->
  <div style="margin:8px 16px 0 16px;border-radius:12px 12px 0 0;box-shadow:0 1px 14px rgba(0,0,0,0.12);background:#ffffff;overflow:hidden;min-width:0;box-sizing:border-box;">
  <!-- Project context strip — shows the selected project header once a Project Number
       is chosen in the smart search (populated by filterChain from getPDSCGetProjectByBU). -->
  <div :style="[[ $variables.planHeader.projectNumber ? 'display:flex;flex-wrap:wrap;gap:8px 28px;padding:12px 16px 4px;font-size:0.85rem;color:#3a4a5a;' : 'display:none;' ]]">
    <span><b>Project:</b> <oj-bind-text value="[[ $variables.planHeader.projectName ]]"></oj-bind-text></span>
    <span><b>Business Unit:</b> <oj-bind-text value="[[ $variables.planHeader.businessUnit ]]"></oj-bind-text></span>
    <span><b>Project Org:</b> <oj-bind-text value="[[ $variables.planHeader.projectOrg ]]"></oj-bind-text></span>
    <span><b>Manager:</b> <oj-bind-text value="[[ $variables.planHeader.projectManager ]]"></oj-bind-text></span>
    <span><b>Status:</b> <oj-bind-text value="[[ $variables.planHeader.status ]]"></oj-bind-text></span>
  </div>
  <oj-sp-collection-container
    display-options.export="on"
    functional-primary-actions="[[ $variables.ccPrimaryActions ]]"
    functional-secondary-actions="[[ $variables.ccSecondaryActions ]]"
    total-items-count="[[ $variables.planLinesArray.length ]]"
    on-sp-primary-action="[[ $listeners.ccPrimaryAction ]]"
    on-sp-secondary-action="[[ $listeners.ccSecondaryAction ]]"
    on-sp-export="[[ $listeners.ccExport ]]">

    <oj-table
      id="planLinesTable"
      data="[[ $variables.planLinesADP ]]"
      style="width:calc(100vw - 64px);height:calc(100vh - 420px);min-height:300px;"
      horizontal-grid-visible="enabled"
      vertical-grid-visible="disabled"
      scroll-policy="loadMoreOnScroll"
      scroll-policy-options.fetch-size="25"
      selection-mode='{"row": "multiple", "column": "none"}'
      selected.row="{{ $variables.selectedKeys }}"
      columns='[
        {"headerText": "Line #",         "field": "line_number",      "headerClassName": "list-header-label", "width": 120},
        {"headerText": "Critical",       "template": "criticalTemplate", "headerClassName": "list-header-label", "width": 120},
        {"headerText": "Line Type",      "field": "line_type",        "headerClassName": "list-header-label", "width": 140},
        {"headerText": "Item Number",    "field": "item_number",      "headerClassName": "list-header-label", "width": 160},
        {"headerText": "Item Description","template": "itemDescTemplate","headerClassName": "list-header-label", "width": 240},
        {"headerText": "Item Category",  "field": "item_category",    "headerClassName": "list-header-label", "width": 190},
        {"headerText": "Task",           "field": "task_name",        "headerClassName": "list-header-label", "width": 150},
        {"headerText": "Planned Qty",    "field": "planned_quantity", "headerClassName": "list-header-label", "width": 150},
        {"headerText": "UOM",            "field": "uom",              "headerClassName": "list-header-label", "width": 90},
        {"headerText": "Planned Cost",   "template": "costTemplate", "headerClassName": "list-header-label", "width": 160},
        {"headerText": "Buyer",          "field": "buyer",            "headerClassName": "list-header-label", "width": 170},
        {"headerText": "Supplier",       "field": "supplier",         "headerClassName": "list-header-label", "width": 160},
        {"headerText": "Status",         "template": "statusTemplate","headerClassName": "list-header-label", "width": 180},
        {"headerText": "",               "template": "actionsTemplate","headerClassName": "list-header-label", "width": 90, "sortable": "disabled"}
      ]'>

      <template slot="criticalTemplate" data-oj-as="cell">
        <span :style="[[ $functions.criticalPill(cell.row.critical_flag) ]]">
          <oj-bind-text value="[[ cell.row.critical_flag ]]"></oj-bind-text>
        </span>
      </template>

      <template slot="itemDescTemplate" data-oj-as="cell">
        <span class="oj-typography-body-md oj-typography-semi-bold">
          <oj-bind-text value="[[ cell.row.item_desc ]]"></oj-bind-text>
        </span>
      </template>

      <template slot="costTemplate" data-oj-as="cell">
        <span class="oj-typography-body-sm">
          <oj-bind-text value="[[ $functions.formatCurrency(cell.row.planned_cost, cell.row.currency_code) ]]"></oj-bind-text>
        </span>
      </template>

      <template slot="statusTemplate" data-oj-as="cell">
        <span :style="[[ $functions.statusPill(cell.row.status) ]]">
          <oj-bind-text value="[[ cell.row.status ]]"></oj-bind-text>
        </span>
      </template>

      <template slot="actionsTemplate" data-oj-as="cell">
        <oj-button display="icons" chroming="borderless" title="Edit line"
          :data-row="[[ JSON.stringify(cell.row) ]]"
          on-oj-action="[[ $listeners.editRow ]]">
          <span slot="startIcon" class="oj-ux-ico-edit"></span>Edit
        </oj-button>
      </template>

    </oj-table>

  </oj-sp-collection-container>
  </div>
  </div>

  <!-- ═══ Add / Edit plan line — Redwood side drawer. Cascading selects (item -> desc/UOM,
       task -> dates) run client-side; constant lists (Line Type / Destination / Strategy /
       Critical) are static. Save -> postPDSCPlanDetails; Delete (edit only) ->
       deletePDSCPlanDetails. ═══ -->
  <oj-drawer-popup edge="end" opened="{{ $variables.drawerOpen }}" style="width: min(560px, 100vw);">
    <div class="oj-flex oj-sm-flex-direction-column" style="height:100%;overflow:hidden;">

      <div class="oj-flex oj-sm-align-items-center oj-sm-justify-content-space-between"
        style="padding:16px 20px;border-bottom:1px solid #e5e7eb;flex-shrink:0;">
        <div class="oj-typography-heading-sm">
          <oj-bind-text value="[[ $variables.drawerMode === 'edit' ? 'Edit Plan Line' : 'Add Plan Line' ]]"></oj-bind-text>
        </div>
        <oj-button display="icons" chroming="borderless" on-oj-action="[[ $listeners.closeDrawer ]]" title="Close">
          <span slot="startIcon" class="oj-ux-ico-close"></span>Close
        </oj-button>
      </div>

      <div style="flex:1;overflow-y:auto;padding:16px 24px;">
        <oj-form-layout label-edge="inside" max-columns="2" column-gap="20px">
          <oj-select-single label-hint="Critical" data="[[ $variables.criticalOptionsADP ]]"
            item-text="label" value="{{ $variables.planForm.critical_flag }}"></oj-select-single>
          <oj-select-single label-hint="Line Type" data="[[ $variables.lineTypeADP ]]"
            item-text="label" value="{{ $variables.planForm.line_type }}"></oj-select-single>

          <oj-select-single label-hint="Item Number" data="[[ $variables.itemADP ]]"
            item-text="item_number" value="{{ $variables.planForm.item_number }}"
            on-value-item-changed="[[ $listeners.itemChanged ]]"></oj-select-single>
          <oj-input-text label-hint="Item Description" value="{{ $variables.planForm.item_desc }}" readonly="true"></oj-input-text>

          <oj-select-single label-hint="Item Category" data="[[ $variables.itemCategoryADP ]]"
            item-text="label" value="{{ $variables.planForm.item_category }}"></oj-select-single>
          <oj-select-single label-hint="Task" data="[[ $variables.taskADP ]]"
            item-text="task_number" value="{{ $variables.planForm.task_number }}"
            on-value-item-changed="[[ $listeners.taskChanged ]]"></oj-select-single>

          <oj-input-number label-hint="Planned Quantity" value="{{ $variables.planForm.planned_quantity }}" min="0"></oj-input-number>
          <oj-input-text label-hint="UOM" value="{{ $variables.planForm.uom }}" readonly="true"></oj-input-text>

          <oj-input-number label-hint="Planned Cost" value="{{ $variables.planForm.planned_cost }}" min="0"></oj-input-number>
          <oj-select-single label-hint="Currency" data="[[ $variables.currencyADP ]]"
            item-text="currency_code" value="{{ $variables.planForm.currency_code }}"></oj-select-single>

          <oj-select-single label-hint="Buyer" data="[[ $variables.buyerADP ]]"
            item-text="label" value="{{ $variables.planForm.buyer }}"></oj-select-single>
          <oj-select-single label-hint="Supplier" data="[[ $variables.supplierADP ]]"
            item-text="vendor_name" value="{{ $variables.planForm.supplier }}"></oj-select-single>

          <oj-input-text label-hint="Supplier Email" value="{{ $variables.planForm.supplier_email_address }}"></oj-input-text>
          <oj-select-single label-hint="Expenditure Type" data="[[ $variables.expTypeADP ]]"
            item-text="expenditure_type_name" value="{{ $variables.planForm.expenditure_type }}"
            on-value-item-changed="[[ $listeners.expTypeChanged ]]"></oj-select-single>

          <oj-select-single label-hint="Inventory Org" data="[[ $variables.invOrgADP ]]"
            item-text="organization_name" value="{{ $variables.planForm.inv_org_name }}"
            on-value-item-changed="[[ $listeners.invOrgChanged ]]"></oj-select-single>
          <oj-select-single label-hint="Destination Type" data="[[ $variables.destinationTypeADP ]]"
            item-text="label" value="{{ $variables.planForm.destination_type }}"></oj-select-single>

          <oj-select-single label-hint="Strategy Objective" data="[[ $variables.strategyADP ]]"
            item-text="label" value="{{ $variables.planForm.acquisition_strategy_objective }}"></oj-select-single>
          <oj-input-date label-hint="Requested Delivery Date" value="{{ $variables.planForm.requested_delivery_date }}"></oj-input-date>

          <oj-input-text label-hint="Planned Start Date" value="{{ $variables.planForm.planned_start_date }}" readonly="true"></oj-input-text>
          <oj-input-text label-hint="Planned Finish Date" value="{{ $variables.planForm.planned_finish_date }}" readonly="true"></oj-input-text>
        </oj-form-layout>
      </div>

      <div class="oj-flex oj-sm-align-items-center oj-sm-justify-content-space-between"
        style="padding:12px 20px;border-top:1px solid #e5e7eb;gap:8px;flex-shrink:0;">
        <oj-bind-if test="[[ $variables.drawerMode === 'edit' ]]">
          <oj-button chroming="danger" on-oj-action="[[ $listeners.deletePlanLine ]]">
            <span slot="startIcon" class="oj-ux-ico-trash"></span>Delete
          </oj-button>
        </oj-bind-if>
        <div class="oj-flex" style="gap:8px;margin-left:auto;">
          <oj-button on-oj-action="[[ $listeners.closeDrawer ]]">Cancel</oj-button>
          <oj-button chroming="callToAction" on-oj-action="[[ $listeners.savePlanLine ]]"
            disabled="[[ $variables.drawerSaving ]]">Save</oj-button>
        </div>
      </div>

    </div>
  </oj-drawer-popup>

</oj-sp-general-overview-page>
