<oj-sp-dashboard-landing-page
  page-title="[[ $variables.pageTitle ]]"
  page-subtitle="[[ $variables.pageSubtitle ]]">

  <!-- KPI Scoreboard -->
  <oj-sp-scoreboard
    slot="kpi"
    data="[[ $variables.kpisADP ]]"
    selection="{{ $variables.selectedKpi }}"
    selection-mode="single">
  </oj-sp-scoreboard>

  <!-- Dashboard Grid — Above Fold layout with 3 panels -->
  <oj-sp-dashboard-grid grid-layout="Above Fold">

    <!-- Panel 1: Budget vs Actual Bar Chart by Category -->
    <oj-sp-dashboard-panel panel-title="Budget vs Actual by Category ($K)">
      <oj-chart
        type="bar"
        orientation="vertical"
        animation-on-display="auto"
        series="[[ $variables.barChartSeries ]]"
        groups="[[ $variables.barChartGroups ]]"
        style="height: 100%;">
      </oj-chart>
    </oj-sp-dashboard-panel>

    <!-- Panel 2: Project Status Distribution Pie Chart -->
    <oj-sp-dashboard-panel panel-title="Project Status Distribution">
      <oj-chart
        type="pie"
        animation-on-display="auto"
        series="[[ $variables.pieChartSeries ]]"
        style="height: 100%;">
      </oj-chart>
    </oj-sp-dashboard-panel>

    <!-- Panel 3: Monthly Spending Trend Line Chart -->
    <oj-sp-dashboard-panel panel-title="Monthly Spending Trend 2025 ($K)">
      <oj-chart
        type="line"
        animation-on-display="auto"
        series="[[ $variables.lineChartSeries ]]"
        groups="[[ $variables.lineChartGroups ]]"
        style="height: 100%;">
      </oj-chart>
    </oj-sp-dashboard-panel>

  </oj-sp-dashboard-grid>

</oj-sp-dashboard-landing-page>
