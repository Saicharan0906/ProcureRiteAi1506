<!DOCTYPE html>
<html class="oj-html" lang="en">
  <head>
    <title>ProcureRite</title>
    <meta charset="UTF-8" />
    <meta content="width=device-width, initial-scale=1" name="viewport" />
    <link rel="icon" type="image/x-icon" href="resources/images/favicon-light.ico" />
    <link rel="preconnect" href="https://static.oracle.com">
    <!-- vb:inject id="headContent" theme="resources/css/dt.theme.redwood" -->
    <style id="pr-overrides">
      /* Taller teal banner to match Oracle SaaS proportions; keep the page within the
         viewport so the wide grid scrolls inside its own area, not the whole page. */
      oj-sp-general-overview-page {
        --oj-sp-page-banner-height: 190px !important;
        --oj-sp-theme-global-bkgd-banner-height: 260px !important;
        max-width: 100% !important;
      }
      /* The smart-search container query decides layout by ITS width: wide => filter
         chips sit BESIDE the field; medium => field is full-width with chips BELOW.
         Cap the container so it lands in the "chips below" tier (like onboardrite). */
      oj-sp-smart-search .oj-sp-smart-search-container {
        max-width: 900px !important;
      }
      /* Keep the wide grid's horizontal scroll INSIDE the content area so the whole
         page (banner + Add Line button) never scrolls sideways. Bound the full chain:
         page -> slot=main -> collection container -> table. */
      oj-sp-general-overview-page [slot="main"] {
        width: 100% !important;
        max-width: 100% !important;
        min-width: 0 !important;
        overflow-x: auto !important;
        box-sizing: border-box !important;
      }
      oj-sp-collection-container {
        display: block !important;
        max-width: 100% !important;
        min-width: 0 !important;
        box-sizing: border-box !important;
      }
      /* Ensure the page-header color strip ("thread") stretches the full banner width */
      [class*="header-strip"],
      [class*="page-texture-strip"],
      [class*="texture-strip"],
      [class*="header-strip"] img,
      [class*="texture-strip"] img {
        background-size: 100% 100% !important;
        background-repeat: no-repeat !important;
        width: 100% !important;
        min-width: 100% !important;
        object-fit: fill !important;
      }
    </style>
  </head>
  <body class="oj-body oj-rw-unified-app oj-sp-theme-global-mode-GH oj-sp-theme-global-pt-erp oj-sp-theme-global-mode-mixed"
        style="--oj-sp-theme-global-texture-image-start: url('https://static.oracle.com/cdn/fnd/gallery/2604.0.2/images/background-shell-finance-start.png'); --oj-sp-theme-global-texture-image-end: url('https://static.oracle.com/cdn/fnd/gallery/2604.0.2/images/background-shell-finance-end.png'); --oj-sp-theme-guided-process-drawer-template-themed-image: url('https://static.oracle.com/cdn/fnd/gallery/2604.0.2/images/ill-guided-process-drawer-abstract-finance.png'); --oj-sp-theme-page-header-strip: url('https://static.oracle.com/cdn/fnd/gallery/2604.0.2/images/color-strip-finance-2x.webp'); --oj-core-bg-color-primary: #ffffff; --oj-core-bg-color-secondary: #f4f6f8; --oj-core-text-color-primary: #1f2937; --oj-core-text-color-secondary: #637387; --oj-core-brand-primary: #1B6ACB; background-color: #ffffff;">
    <oj-vb-content config="[[vbApplication]]"></oj-vb-content>
    <!-- visualBuilderScripts -->
  </body>
</html>
