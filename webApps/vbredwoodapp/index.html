<!DOCTYPE html>
<html class="oj-html" lang="en">
  <head>
    <title>ProcureRite</title>
    <meta charset="UTF-8" />
    <meta content="width=device-width, initial-scale=1" name="viewport" />
    <link rel="icon" type="image/x-icon" href="resources/images/favicon-light.ico" />
    <link rel="preconnect" href="https://static.oracle.com">
    <!-- vb:inject id="headContent" theme="resources/css/dt.theme.redwood" -->
    <style id="pr-overrides">
      /* Taller teal banner to match Oracle SaaS proportions; keep the page within the
         viewport so the wide grid scrolls inside its own area, not the whole page. */
      oj-sp-general-overview-page {
        --oj-sp-page-banner-height: 190px !important;
        --oj-sp-theme-global-bkgd-banner-height: 260px !important;
        max-width: 100% !important;
      }
      /* The smart-search container query decides layout by ITS width: wide => filter
         chips sit BESIDE the field; medium => field is full-width with chips BELOW.
         Cap the container so it lands in the "chips below" tier (like onboardrite). */
      oj-sp-smart-search .oj-sp-smart-search-container {
        max-width: 900px !important;
      }
      /* NOTE: do NOT put overflow-x:hidden on html/body or on the overview page —
         it clips the banner's primary-action button (Add Line) at the right edge AND
         suppresses the grid's horizontal scrollbar. The grid is instead contained by
         giving oj-table its own bounded height (it scrolls internally), so the page
         never needs to scroll/shift sideways. */
      /* The white results surface is painted by oj-sp-collection-container, so the
         floating-card treatment must go on THAT element (styling the slot wrapper did
         nothing because the collection-container paints over it). L/R margin = the side
         GAP (teal shows beside the card); negative top margin overlaps the banner;
         rounded top corners + soft shadow = the elevated onboardrite look. slot=main
         stays transparent and just contains the wide grid. */
      oj-sp-general-overview-page [slot="main"] {
        max-width: 100% !important;
        min-width: 0 !important;
        box-sizing: border-box !important;
        overflow-x: hidden !important;
      }
      /* Table column headers on ONE line + full cell text. These MUST live here in
         index.html — the page-level .css file does not load in this app, so rules
         placed there have no effect. oj-table is light-DOM so global CSS reaches it. */
      #planLinesTable .list-header-label,
      #planLinesTable .oj-table-column-header-text,
      #planLinesTable .oj-table-column-header-cell {
        white-space: nowrap !important;
      }
      /* Show the FULL header label (JET clips it by default). overflow:visible on the
         label/text only - NOT the header internals - so the column layout is untouched. */
      #planLinesTable .list-header-label,
      #planLinesTable .oj-table-column-header-text {
        overflow: visible !important;
        text-overflow: clip !important;
      }
      #planLinesTable .oj-table-data-cell {
        white-space: nowrap !important;
      }
      /* Same header treatment for EVERY grid in the app (global, so any oj-table page —
         Procurement Execution etc. — gets it). nowrap on the header cell + label + text;
         overflow:visible + clip on the LABEL/TEXT only (never padding/margin on the cell or
         sort-icon internals — that hides the columns). */
      .list-header-label,
      .oj-table-column-header-text,
      .oj-table-column-header-cell {
        white-space: nowrap !important;
      }
      .list-header-label,
      .oj-table-column-header-text {
        overflow: visible !important;
        text-overflow: clip !important;
      }
      .oj-table-data-cell { white-space: nowrap !important; }
      /* Execution status pills (defined here; page .css does not load). */
      .pexec-status { display:inline-block; padding:3px 10px; border-radius:12px; font-size:0.78rem; font-weight:600; white-space:nowrap; }
      .pexec-status-ready { background:#e8f0fe; color:#174ea6; }
      .pexec-status-req   { background:#fef7e0; color:#8a6d00; }
      .pexec-status-nego  { background:#f3e8fd; color:#6b21a8; }
      .pexec-status-po    { background:#e6f4ea; color:#137333; }
      /* Comfortable left/right inset for the banner content (title / search / chips /
         Add Line), matching onboardrite's Programs page. The grid area (slot=main)
         above gets the same 32px so the table lines up under the title. */
      oj-sp-general-overview-page [class*="general-overview-page-header"] {
        padding-left: 32px !important;
        padding-right: 32px !important;
      }
      /* Ensure the page-header color strip ("thread") stretches the full banner width */
      [class*="header-strip"],
      [class*="page-texture-strip"],
      [class*="texture-strip"],
      [class*="header-strip"] img,
      [class*="texture-strip"] img {
        background-size: 100% 100% !important;
        background-repeat: no-repeat !important;
        width: 100% !important;
        min-width: 100% !important;
        object-fit: fill !important;
      }
      /* Quick-filter chips (Draft / Ready for Procurement / Critical). Defined here because
         the page .css does not load and :style string bindings do not apply in this app;
         class-based styling on light-DOM divs is reliable. */
      .ppp-chiprow { display: flex; flex-wrap: wrap; gap: 8px; padding: 0 32px 12px; align-items: center; }
      .ppp-chiprow.is-hidden { display: none; }
      .ppp-chip {
        display: inline-flex; align-items: center; gap: 6px;
        padding: 5px 12px; border-radius: 16px; cursor: pointer;
        font-size: 0.82rem; font-weight: 600; line-height: 1.1;
        border: 1px solid #cfd6dd; background: #f1f4f6; color: #3a4a5a;
        user-select: none; white-space: nowrap;
      }
      .ppp-chip:hover { background: #e6ebef; }
      .ppp-chip.is-active { background: #0a4a5e; border-color: #0a4a5e; color: #ffffff; }
      .ppp-chip.is-active-critical { background: #b3261e; border-color: #b3261e; color: #ffffff; }
    </style>
  </head>
  <body class="oj-body oj-rw-unified-app oj-sp-theme-global-mode-GH oj-sp-theme-global-pt-erp oj-sp-theme-global-mode-mixed"
        style="--oj-sp-theme-global-texture-image-start: url('https://static.oracle.com/cdn/fnd/gallery/2604.0.2/images/background-shell-finance-start.png'); --oj-sp-theme-global-texture-image-end: url('https://static.oracle.com/cdn/fnd/gallery/2604.0.2/images/background-shell-finance-end.png'); --oj-sp-theme-guided-process-drawer-template-themed-image: url('https://static.oracle.com/cdn/fnd/gallery/2604.0.2/images/ill-guided-process-drawer-abstract-finance.png'); --oj-sp-theme-page-header-strip: url('https://static.oracle.com/cdn/fnd/gallery/2604.0.2/images/color-strip-finance-2x.webp'); --oj-core-bg-color-primary: #ffffff; --oj-core-bg-color-secondary: #f4f6f8; --oj-core-text-color-primary: #1f2937; --oj-core-text-color-secondary: #637387; --oj-core-brand-primary: #1B6ACB; background-color: #ffffff;">
    <oj-vb-content config="[[vbApplication]]"></oj-vb-content>
    <!-- visualBuilderScripts -->
  </body>
</html>
